services:
  # ============================================================
  # 1) BACKEND — Node.js API
  # ============================================================
  - type: web
    name: moviezone-api
    runtime: node
    rootDir: moviebox-api1-main
    plan: starter
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true

  # ============================================================
  # 2) FRONTEND — Vite React App (Static Site — always free)
  # ============================================================
  - type: static
    name: moviezone-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://moviezone-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
