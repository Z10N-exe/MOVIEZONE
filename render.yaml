services:
  # ============================================================
  # 1) BACKEND — Node.js API (Free Web Service)
  # ============================================================
  - type: web
    name: moviezone-api
    runtime: node
    rootDir: moviebox-api1-main
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true

  # ============================================================
  # 2) FRONTEND — Vite React App (Free Static Site)
  # ============================================================
  - type: web
    name: moviezone-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://moviezone-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
