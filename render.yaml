services:
  # ============================================================
  # 1) BACKEND — Node.js API (FREE)
  # ============================================================
  - type: web
    name: moviezone-api
    runtime: node
    rootDir: moviebox-api1-main
    plan: free
    buildCommand: npm install
    startCommand: node index.js

    envVars:
      - key: NODE_ENV
        value: production

      - key: JWT_SECRET
        generateValue: true


  # ============================================================
  # 2) FRONTEND — Vite React App (SERVE AS WEB)
  # ============================================================
  - type: web
    name: moviezone-frontend
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        value: https://moviezone-api.onrender.com/api